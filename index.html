<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 Gomoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>五子棋</h1>
            <p class="rules">玩法：黑白雙方輪流落子，先在橫、豎、斜任一方向連成 5 子者獲勝。</p>
        </header>

        <main>
            <div class="status-panel">
                <h2 id="status">當前輪到：<span class="player-black">黑子</span></h2>
                <button id="restart-btn" class="btn">重新開始</button>
            </div>
            
            <div id="board-container">
                <div id="board"></div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Gomoku Web Game</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
